<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建秘钥 - 经验阁 ExpHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; z-index: 100; }
        .sidebar .brand { font-size: 1.4rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar .brand span { color: #e94560; }
        .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(233,69,96,0.2); color: #fff; border-left: 3px solid #e94560; }
        .main-content { margin-left: 220px; padding: 25px; }
        .topbar { background: #fff; padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #d63850; border-color: #d63850; }
        .form-control:focus { border-color: #e94560; box-shadow: none; }
        .api-key-box { background: #f8f9fa; border-radius: 8px; padding: 15px; font-family: monospace; word-break: break-all; }
        .permission-tag { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; margin-right: 10px; }
        .permission-search { background: #d4edda; color: #155724; }
        .permission-create { background: #fff3cd; color: #856404; }
        .permission-update { background: #cce5ff; color: #004085; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a th:href="@{/dashboard}"><i class="fas fa-chart-line mr-2"></i> 仪表盘</a>
        <a th:href="@{/docs}"><i class="fas fa-book-open mr-2"></i> 经验管理</a>
        <a th:href="@{/assistants}" class="active"><i class="fas fa-key mr-2"></i> 秘钥管理</a>
        <a th:href="@{/logs}"><i class="fas fa-history mr-2"></i> 调用日志</a>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a th:href="@{/logout}" class="text-white-50" style="font-size: 0.85rem;"><i class="fas fa-sign-out-alt mr-1"></i> 退出登录</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h4 class="mb-0">新建秘钥</h4>
            <div id="topbarActions">
                <a th:href="@{/assistants}" class="btn btn-outline-secondary btn-sm mr-2">取消</a>
                <button class="btn btn-primary btn-sm" id="createBtn" onclick="createAssistant()">
                    <i class="fas fa-save mr-1"></i> 创建
                </button>
            </div>
            <div id="resultActions" style="display:none;">
                <a th:href="@{/assistants}" class="btn btn-outline-secondary btn-sm mr-2">返回列表</a>
                <button class="btn btn-primary btn-sm" onclick="goToAdd()">
                    <i class="fas fa-plus mr-1"></i> 继续创建
                </button>
            </div>
        </div>

        <div class="card" style="max-width: 600px;">
            <div class="card-body p-4">
                <form id="form">
                    <div class="form-group mb-3">
                        <label>秘钥名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="assistantName" required placeholder="如：朱雀">
                    </div>
                    <div class="form-group mb-3">
                        <label>描述</label>
                        <textarea class="form-control" id="description" rows="2" placeholder="秘钥的用途、特点描述"></textarea>
                    </div>
                    <div class="form-group mb-4">
                        <label>权限设置</label>
                        <div class="p-3 bg-light rounded">
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="canSearch" checked>
                                <label class="custom-control-label" for="canSearch">
                                    <span class="permission-tag permission-search">查询</span>
                                    允许搜索经验文档（默认开启）
                                </label>
                            </div>
                            <div class="custom-control custom-switch mb-2">
                                <input type="checkbox" class="custom-control-input" id="canCreate">
                                <label class="custom-control-label" for="canCreate">
                                    <span class="permission-tag permission-create">创建</span>
                                    允许创建新经验文档
                                </label>
                            </div>
                            <div class="custom-control custom-switch">
                                <input type="checkbox" class="custom-control-input" id="canUpdate">
                                <label class="custom-control-label" for="canUpdate">
                                    <span class="permission-tag permission-update">编辑</span>
                                    允许编辑/更新经验文档
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle mr-1"></i>
                        <strong>提示：</strong>API Key 将在创建时自动生成，无需手动输入。
                    </div>
                </form>

                <div id="resultBox" style="display:none;">
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle mr-2"></i>创建成功！API Key 已生成（请妥善保存，之后无法找回）：
                    </div>
                    <div class="api-key-box">
                        <strong>API Key:</strong> <span id="apiKeyDisplay"></span>
                    </div>
                    <div class="api-key-box mt-2">
                        <strong>Secret:</strong> <span id="apiKeySecretDisplay"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        var contextPath = /*[[${contextPath}]]*/ '';
        var isCreating = false;

        function goToAdd() {
            window.location.href = contextPath + '/assistants/add';
        }

        async function createAssistant() {
            if (isCreating) return;
            isCreating = true;
            var btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 创建中...';

            var data = {
                assistantName: document.getElementById('assistantName').value.trim(),
                description: document.getElementById('description').value.trim(),
                canSearch: document.getElementById('canSearch').checked,
                canCreate: document.getElementById('canCreate').checked,
                canUpdate: document.getElementById('canUpdate').checked
            };
            if (!data.assistantName) {
                alert('秘钥名称不能为空');
                resetButton();
                return;
            }
            try {
                var resp = await fetch(contextPath + '/api/assistants', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                var result = await resp.json();
                if (result.code === 0) {
                    // 跳转到结果页面
                    window.location.href = contextPath + '/assistants/created?apiKey=' + encodeURIComponent(result.data.apiKey) + '&apiKeySecret=' + encodeURIComponent(result.data.apiKeySecret);
                } else {
                    alert('创建失败：' + result.message);
                    resetButton();
                }
            } catch (e) { 
                alert('创建失败：' + e.message); 
                resetButton();
            }
        }

        function resetButton() {
            isCreating = false;
            var btn = document.getElementById('createBtn');
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-1"></i> 创建';
            }
        }
    </script>
</body>
</html>
