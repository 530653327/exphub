<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 经验阁 ExpHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; z-index: 100; }
        .sidebar .brand { font-size: 1.4rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar .brand span { color: #e94560; }
        .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(233,69,96,0.2); color: #fff; border-left: 3px solid #e94560; }
        .sidebar a i { width: 20px; }
        .main-content { margin-left: 220px; padding: 25px; }
        .topbar { background: #fff; padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #d63850; border-color: #d63850; }
        .btn-primary:disabled { background: #999; border-color: #999; }
        .form-control { border-radius: 8px; }
        .form-control:focus { border-color: #e94560; box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.15); }
        .alert { border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a href="/exphub/dashboard"><i class="fas fa-chart-line mr-2"></i> 仪表盘</a>
        <a href="/exphub/docs"><i class="fas fa-book-open mr-2"></i> 经验管理</a>
        <a href="/exphub/kanban"><i class="fas fa-tasks mr-2"></i> 待办看板</a>
        <a href="/exphub/assistants"><i class="fas fa-robot mr-2"></i> 助手管理</a>
        <a href="/exphub/logs"><i class="fas fa-history mr-2"></i> 调用日志</a>
        <div style="margin-top: 20px; padding: 0 20px;">
            <a href="/exphub/profile/password" class="active"><i class="fas fa-lock mr-2"></i> 修改密码</a>
        </div>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a href="/exphub/logout" class="text-white-50" style="font-size: 0.85rem;"><i class="fas fa-sign-out-alt mr-1"></i> 退出登录</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h4 class="mb-0">修改密码</h4>
            <span class="text-muted" th:text="${session.user?.displayName} ?: '管理员'">管理员</span>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body p-5">
                        <h5 class="card-title mb-4"><i class="fas fa-key mr-2"></i>修改登录密码</h5>

                        <div id="alert" style="display:none;" class="alert"></div>

                        <form id="passwordForm">
                            <div class="form-group">
                                <label>原密码</label>
                                <input type="password" id="oldPassword" class="form-control" placeholder="输入当前密码" required>
                            </div>
                            <div class="form-group">
                                <label>新密码</label>
                                <input type="password" id="newPassword" class="form-control" placeholder="输入新密码（至少6位）" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label>确认新密码</label>
                                <input type="password" id="confirmPassword" class="form-control" placeholder="再次输入新密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block mt-4">确认修改</button>
                        </form>

                        <div class="mt-4 text-muted small">
                            <i class="fas fa-info-circle mr-1"></i>
                            修改成功后需要重新登录
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        var contextPath = /*[[${contextPath}]]*/ '';
    </script>
    <script>
    $(function() {
        function showAlert(message, type) {
            var $alert = $('#alert');
            $alert.removeClass('alert-success alert-danger')
                  .addClass('alert-' + (type === 'success' ? 'success' : 'danger'))
                  .text(message)
                  .fadeIn();
            setTimeout(function() { $alert.fadeOut(); }, 5000);
        }

        $('#passwordForm').on('submit', function(e) {
            e.preventDefault();

            var oldPwd = $('#oldPassword').val().trim();
            var newPwd = $('#newPassword').val().trim();
            var confirmPwd = $('#confirmPassword').val().trim();

            if (!oldPwd) { showAlert('请输入原密码', 'error'); return; }
            if (!newPwd) { showAlert('请输入新密码', 'error'); return; }
            if (newPwd.length < 6) { showAlert('新密码长度不能少于6位', 'error'); return; }
            if (newPwd !== confirmPwd) { showAlert('两次输入的新密码不一致', 'error'); return; }
            if (oldPwd === newPwd) { showAlert('新密码不能与原密码相同', 'error'); return; }

            var $btn = $(this).find('button[type="submit"]');
            $btn.prop('disabled', true).text('修改中...');

            $.ajax({
                url: contextPath + '/api/auth/change-password',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    oldPassword: oldPwd,
                    newPassword: newPwd,
                    confirmPassword: confirmPwd
                }),
                success: function(res) {
                    if (res.code === 0) {
                        showAlert(res.message, 'success');
                        setTimeout(function() {
                            window.location.href = contextPath + '/login';
                        }, 1500);
                    } else {
                        showAlert(res.message, 'error');
                        $btn.prop('disabled', false).text('确认修改');
                    }
                },
                error: function(xhr) {
                    var msg = '请求失败，请稍后重试';
                    try { var r = JSON.parse(xhr.responseText); if (r.message) msg = r.message; } catch(e) {}
                    showAlert(msg, 'error');
                    $btn.prop('disabled', false).text('确认修改');
                }
            });
        });
    });
    </script>
</body>
</html>
