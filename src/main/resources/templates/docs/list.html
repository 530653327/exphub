<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经验管理 - 经验阁 ExpHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; z-index: 100; }
        .sidebar .brand { font-size: 1.4rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar .brand span { color: #e94560; }
        .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(233,69,96,0.2); color: #fff; border-left: 3px solid #e94560; }
        .main-content { margin-left: 220px; padding: 25px; }
        .topbar { background: #fff; padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 18px 25px; }
        .badge-status { padding: 5px 10px; border-radius: 20px; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-completed { background: #cce5ff; color: #004085; }
        .badge-broken { background: #f8d7da; color: #721c24; }
        .badge-deprecated { background: #fff3cd; color: #856404; }
        .badge-primary { background: #e94560; border-color: #e94560; }
        .badge-version { background: #e8eaf6; color: #3949ab; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .search-box { border-radius: 30px; padding: 10px 20px; border: 1px solid #e0e0e0; width: 300px; }
        .doc-item { padding: 20px 25px; border-bottom: 1px solid #f5f5f5; transition: all 0.2s; }
        .doc-item:hover { background: #fafafa; }
        .doc-item:last-child { border-bottom: none; }
        .doc-title { font-size: 1.05rem; font-weight: 600; color: #333; }
        .doc-title:hover { color: #e94560; }
        .doc-meta { font-size: 0.85rem; color: #999; margin-top: 5px; }
        .doc-tags .tag { display: inline-block; padding: 2px 10px; border-radius: 15px; font-size: 0.8rem; margin-right: 5px; margin-top: 5px; font-weight: 500; }
        .doc-tags .tag:nth-child(6n+1) { background: #fce4ec; color: #c62828; }
        .doc-tags .tag:nth-child(6n+2) { background: #e8eaf6; color: #283593; }
        .doc-tags .tag:nth-child(6n+3) { background: #e0f2f1; color: #00695c; }
        .doc-tags .tag:nth-child(6n+4) { background: #fff3e0; color: #e65100; }
        .doc-tags .tag:nth-child(6n+5) { background: #f3e5f5; color: #6a1b9a; }
        .doc-tags .tag:nth-child(6n+6) { background: #e1f5fe; color: #01579b; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a th:href="@{/dashboard}"><i class="fas fa-chart-line mr-2"></i> 仪表盘</a>
        <a th:href="@{/docs}" class="active"><i class="fas fa-book-open mr-2"></i> 经验管理</a>
        <a th:href="@{/assistants}"><i class="fas fa-key mr-2"></i> 秘钥管理</a>
        <a th:href="@{/logs}"><i class="fas fa-history mr-2"></i> 调用日志</a>
        <a th:href="@{/templates}"><i class="fas fa-file-alt mr-2"></i> 模板管理</a>
        <div style="margin-top: 20px; padding: 0 20px;">
            <a th:href="@{/profile/password}"><i class="fas fa-lock mr-2"></i> 修改密码</a>
        </div>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a th:href="@{/logout}" class="text-white-50" style="font-size: 0.85rem;"><i class="fas fa-sign-out-alt mr-1"></i> 退出登录</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h4 class="mb-0">经验管理</h4>
            <div class="d-flex align-items-center">
                <select class="form-control mr-2" id="templateTypeFilter" onchange="doFilter()" style="width:160px;border-radius:20px;height:42px;">
                    <option value="">全部类型</option>
                    <option value="problem_solution" th:selected="${templateType == 'problem_solution'}">🛠️ 问题方案</option>
                    <option value="knowledge_doc" th:selected="${templateType == 'knowledge_doc'}">📚 知识文档</option>
                    <option value="todo_list" th:selected="${templateType == 'todo_list'}">✅ 待办事项</option>
                    <option value="bug_fix" th:selected="${templateType == 'bug_fix'}">🐛 Bug修复</option>
                    <option value="config_guide" th:selected="${templateType == 'config_guide'}">⚙️ 配置指南</option>
                    <option value="how_to" th:selected="${templateType == 'how_to'}">📖 操作指南</option>
                    <option value="schedule_plan" th:selected="${templateType == 'schedule_plan'}">📅 计划排期</option>
                </select>
                <div class="input-group" style="width: 300px;">
                    <input type="text" class="form-control search-box" placeholder="搜索经验或输入ID精确查找..." id="searchInput" th:value="${keyword}">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" onclick="doSearch()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <a th:href="@{/docs/edit}" class="btn btn-primary ml-3">
                    <i class="fas fa-plus mr-1"></i> 新建经验
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span th:if="${keyword != null && keyword != ''}">
                    搜索 "<strong th:text="${keyword}"></strong>" 的结果：共 <span th:text="${totalRows}">0</span> 条
                </span>
                <span th:if="${templateType != null && templateType != ''}">
                    <span th:if="${keyword != null && keyword != ''}">，</span>类型：<strong th:switch="${templateType}">
                        <span th:case="'problem_solution'">🛠️ 问题方案</span>
                        <span th:case="'knowledge_doc'">📚 知识文档</span>
                        <span th:case="'todo_list'">✅ 待办事项</span>
                        <span th:case="'bug_fix'">🐛 Bug修复</span>
                        <span th:case="'config_guide'">⚙️ 配置指南</span>
                        <span th:case="'how_to'">📖 操作指南</span>
                        <span th:case="'schedule_plan'">📅 计划排期</span>
                        <span th:case="*">其他</span>
                    </strong>
                </span>
                <span th:if="${keyword == null || keyword == ''}"><span th:if="${templateType == null || templateType == ''}">全部经验，共 <span th:text="${totalRows}">0</span> 条</span></span>
            </div>
            <div class="card-body p-0" id="docList">
                <div class="doc-item" th:each="doc : ${docs}">
                        <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <a class="doc-title" th:href="@{/docs/{id}(id=${doc.id})}" th:text="${doc.title}">-</a>
                            <span class="badge badge-version ml-2" th:if="${doc.templateType != null and !doc.templateType.isEmpty()}" style="background:#e8f0fe;color:#1967d2;padding:3px 8px;border-radius:12px;font-size:0.75rem;font-weight:600;">
                                <span th:switch="${doc.templateType}">
                                    <span th:case="'problem_solution'">🛠️ 问题方案</span>
                                    <span th:case="'knowledge_doc'">📚 知识文档</span>
                                    <span th:case="'todo_list'">✅ 待办事项</span>
                                    <span th:case="'bug_fix'">🐛 Bug修复</span>
                                    <span th:case="'config_guide'">⚙️ 配置指南</span>
                                    <span th:case="'how_to'">📖 操作指南</span>
                                    <span th:case="'schedule_plan'">📅 计划排期</span>
                                    <span th:case="*">📄 通用</span>
                                </span>
                            </span>
                            <div class="doc-meta">
                                <span class="text-muted mr-2">#<strong th:text="${doc.id}">0</strong></span>
                                <i class="fas fa-user ml-2 mr-1"></i><span th:text="${doc.authorName}">-</span>
                                <i class="fas fa-folder ml-3 mr-1"></i><span th:text="${doc.category ?: '未分类'}">-</span>
                                <i class="fas fa-clock ml-3 mr-1"></i><span th:text="${#temporals.format(doc.updatedAt, 'yyyy-MM-dd HH:mm')}">-</span>
                                <i class="fas fa-eye ml-3 mr-1"></i><span th:text="${doc.callCount}">0</span>次调用
                                <span class="badge badge-version ml-2" th:title="'当前版本：v' + ${doc.version}">v<span th:text="${doc.version}">1</span></span>
                            </div>
                            <div class="doc-tags">
                                <span class="tag" th:each="tag : (${#strings.arraySplit(doc.tags, ',')})" th:text="${tag}">标签</span>
                            </div>
                        </div>
                        <div class="text-right ml-3">
                            <span th:if="${doc.status == 'ACTIVE'}" class="badge badge-active">正常</span>
                            <span th:if="${doc.status == 'COMPLETED'}" class="badge badge-completed">已完成</span>
                            <span th:if="${doc.status == 'BROKEN'}" class="badge badge-broken">已失效</span>
                            <span th:if="${doc.status == 'DEPRECATED'}" class="badge badge-deprecated">已过期</span>
                            <button class="btn btn-sm btn-outline-danger ml-2" th:onclick="'deleteDoc(' + ${doc.id} + ')'" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(docs)}" class="text-center text-muted py-5">
                    <i class="fas fa-inbox fa-3x mb-3"></i>
                    <p>暂无经验文档，<a th:href="@{/docs/edit}">创建一个</a>吧~</p>
                </div>
            </div>
            <!-- 分页 -->
            <div th:if="${totalPages > 1}" class="card-footer bg-white">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/docs(keyword=${keyword}, templateType=${templateType}, page=${currentPage - 1})}">&laquo; 上一页</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/docs(keyword=${keyword}, templateType=${templateType}, page=${i})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/docs(keyword=${keyword}, templateType=${templateType}, page=${currentPage + 1})}">下一页 &raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        var contextPath = /*[[${contextPath}]]*/ '';

        function doSearch() {
            var keyword = document.getElementById('searchInput').value.trim();
            var templateType = document.getElementById('templateTypeFilter').value;
            var url = contextPath + '/docs?keyword=' + encodeURIComponent(keyword);
            if (templateType) url += '&templateType=' + encodeURIComponent(templateType);
            window.location.href = url;
        }

        function doFilter() {
            var templateType = document.getElementById('templateTypeFilter').value;
            var keyword = document.getElementById('searchInput').value.trim();
            var url = contextPath + '/docs';
            var params = [];
            if (keyword) params.push('keyword=' + encodeURIComponent(keyword));
            if (templateType) params.push('templateType=' + encodeURIComponent(templateType));
            if (params.length > 0) url += '?' + params.join('&');
            window.location.href = url;
        }

        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });

        function deleteDoc(id) {
            if (!confirm('确定要删除这条经验吗？删除后将无法恢复。')) {
                return;
            }
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = contextPath + '/docs/' + id + '/delete';
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
