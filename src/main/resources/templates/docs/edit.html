<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建经验 - 经验阁 ExpHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; z-index: 100; }
        .sidebar .brand { font-size: 1.4rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar .brand span { color: #e94560; }
        .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(233,69,96,0.2); color: #fff; border-left: 3px solid #e94560; }
        .main-content { margin-left: 220px; padding: 25px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #d63850; border-color: #d63850; }
        .template-hint { background: #e7f3ff; border-left: 3px solid #2196f3; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .template-hint h6 { color: #1565c0; margin-bottom: 8px; }
        .template-hint pre { background: #f5f5f5; padding: 10px; border-radius: 4px; font-size: 0.85rem; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a th:href="@{/dashboard}"><i class="fas fa-chart-line mr-2"></i> 仪表盘</a>
        <a th:href="@{/docs}" class="active"><i class="fas fa-book-open mr-2"></i> 经验管理</a>
        <a th:href="@{/assistants}"><i class="fas fa-key mr-2"></i> 秘钥管理</a>
        <a th:href="@{/logs}"><i class="fas fa-history mr-2"></i> 调用日志</a>
        <a th:href="@{/templates}"><i class="fas fa-file-alt mr-2"></i> 模板管理</a>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a th:href="@{/logout}" class="text-white-50" style="font-size: 0.85rem;"><i class="fas fa-sign-out-alt mr-1"></i> 退出登录</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar d-flex justify-content-between align-items-center">
            <h4 class="mb-0">[[${doc.id != null ? '编辑经验' : '新建经验'}]]</h4>
            <a th:href="@{/docs}" class="btn btn-outline-secondary">返回列表</a>
        </div>

        <!-- 模板提示 -->
        <div class="template-hint" id="templateHint" style="display: none;">
            <h6><i class="fas fa-lightbulb mr-1"></i> 经验记录指南</h6>
            <p class="text-muted mb-2" id="instructionText"></p>
            <pre id="templateContentPreview"></pre>
        </div>

        <div class="card mt-3">
            <div class="card-body">
                <input type="hidden" id="docId" th:value="${doc.id}">
                <div class="form-group">
                    <label>标题 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" th:value="${doc.title}" placeholder="经验标题">
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>分类</label>
                            <input type="text" class="form-control" id="category" th:value="${doc.category}" placeholder="如：编程、运维、客服">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>标签</label>
                            <input type="text" class="form-control" id="tags" th:value="${doc.tags}" placeholder="多个标签用逗号分隔">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>摘要</label>
                    <textarea class="form-control" id="summary" rows="2" th:text="${doc.summary}" placeholder="简要描述这个经验"></textarea>
                </div>
                <div class="form-group">
                    <label>别名</label>
                    <input type="text" class="form-control" id="aliases" th:value="${doc.aliases}" placeholder="多个别名用逗号分隔">
                </div>
                <div class="form-group">
                    <label>内容 <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="content" rows="20" th:text="${doc.content}" placeholder="经验内容（Markdown格式）"></textarea>
                </div>
                <div class="text-right">
                    <button class="btn btn-primary" onclick="saveDoc()">
                        <i class="fas fa-save mr-1"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        var contextPath = /*[[${#httpServletRequest.getContextPath()}]]*/ '';
        var defaultTemplate = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadTemplate();
        });

        function loadTemplate() {
            fetch(contextPath + '/api/templates/default')
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.data) {
                        defaultTemplate = res.data;
                        document.getElementById('instructionText').textContent = defaultTemplate.instruction;
                        document.getElementById('templateContentPreview').textContent = defaultTemplate.templateContent;
                        document.getElementById('templateHint').style.display = 'block';
                    }
                });
        }

        async function saveDoc() {
            var data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                tags: document.getElementById('tags').value,
                summary: document.getElementById('summary').value,
                aliases: document.getElementById('aliases').value,
                content: document.getElementById('content').value
            };

            if (!data.title) { alert('请输入标题'); return; }
            if (!data.content) { alert('请输入内容'); return; }

            var id = document.getElementById('docId').value;
            var url = contextPath + '/api/docs';
            var method = 'POST';

            if (id) {
                url += '/' + id;
                method = 'PUT';
            }

            var res = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(r => r.json());

            if (res.success) {
                alert('保存成功');
                window.location.href = contextPath + '/docs';
            } else {
                alert(res.message || '保存失败');
            }
        }
    </script>
</body>
</html>
