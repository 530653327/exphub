<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经验阁 ExpHub - 管理后台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a2e'/><text x='16' y='23' font-size='20' text-anchor='middle' fill='%23e94560' font-family='system-ui,sans-serif' font-weight='bold'>E</text></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 220px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px 0;
            z-index: 100;
        }
        .sidebar .brand {
            font-size: 1.4rem;
            font-weight: bold;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar .brand span { color: #e94560; }
        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(233,69,96,0.2);
            color: #fff;
            border-left: 3px solid #e94560;
        }
        .sidebar a i { width: 20px; }
        .main-content {
            margin-left: 220px;
            padding: 25px;
        }
        .topbar {
            background: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .stat-card {
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .stat-card .icon {
            font-size: 2.5rem;
            opacity: 0.3;
            position: absolute;
            right: 15px; top: 15px;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-card .label { opacity: 0.8; font-size: 0.9rem; }
        .bg-gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-gradient-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .bg-gradient-danger { background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%); }
        .bg-gradient-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .table { background: #fff; border-radius: 12px; }
        .table thead th { border: none; background: #f8f9fa; color: #666; font-weight: 600; }
        .badge-status { padding: 5px 10px; border-radius: 20px; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-broken { background: #f8d7da; color: #721c24; }
        .badge-deprecated { background: #fff3cd; color: #856404; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #d63850; border-color: #d63850; }
    </style>
</head>
<body>
    <div class="sidebar" th:fragment="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a href="/dashboard" th:classappend="${active == 'dashboard'} ? 'active' : ''">
            <i class="fas fa-chart-line mr-2"></i> 仪表盘
        </a>
        <a href="/docs" th:classappend="${active == 'docs'} ? 'active' : ''">
            <i class="fas fa-book-open mr-2"></i> 经验管理
        </a>
        <a href="/kanban" th:classappend="${active == 'kanban'} ? 'active' : ''">
            <i class="fas fa-tasks mr-2"></i> 待办看板
        </a>
        <a href="/assistants" th:classappend="${active == 'assistants'} ? 'active' : ''">
            <i class="fas fa-robot mr-2"></i> 助手管理
        </a>
        <a href="/logs" th:classappend="${active == 'logs'} ? 'active' : ''">
            <i class="fas fa-history mr-2"></i> 调用日志
        </a>
        <div style="margin-top: 20px; padding: 0 20px;">
            <a href="/profile/password" th:classappend="${active == 'profile'} ? 'active' : ''">
                <i class="fas fa-lock mr-2"></i> 修改密码
            </a>
        </div>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a href="/logout" class="text-white-50" style="font-size: 0.85rem;">
                <i class="fas fa-sign-out-alt mr-1"></i> 退出登录
            </a>
        </div>
    </div>

    <div class="main-content" th:fragment="content">
        <div class="topbar">
            <h4 class="mb-0" th:text="${pageTitle} ?: '仪表盘'">仪表盘</h4>
            <div>
                <span class="text-muted mr-3" th:text="${session.user?.displayName} ?: '管理员'">管理员</span>
                <i class="fas fa-user-circle fa-lg text-muted"></i>
            </div>
        </div>

        <div th:replace="~{::content}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
