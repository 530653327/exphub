<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 经验阁 ExpHub'">待办看板 - 经验阁 ExpHub</title>
    <th:block th:fragment="head">
    <style>
        /* ===== Kanban 看板样式 ===== */
        :root {
            --kanban-bg: #f0f2f5;
            --kanban-surface: #ffffff;
            --kanban-border: #e2e5ea;
            --kanban-text-primary: #1a1d23;
            --kanban-text-secondary: #6b7280;
            --kanban-text-muted: #9ca3af;
            --kanban-shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --kanban-shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --kanban-shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --kanban-radius-sm: 8px;
            --kanban-radius-md: 12px;
            --kanban-radius-lg: 16px;
            --kanban-transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .kanban-wrapper {
            margin: -25px;
            background: var(--kanban-bg);
            min-height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .kanban-header {
            background: var(--kanban-surface);
            border-bottom: 1px solid var(--kanban-border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
        }
        .kanban-header-left { display: flex; align-items: center; gap: 12px; }
        .kanban-header-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 18px;
        }
        .kanban-header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .kanban-header-subtitle { font-size: 12px; color: var(--kanban-text-muted); }

        /* Filter Bar */
        .kanban-filter-bar {
            background: var(--kanban-surface);
            border-bottom: 1px solid var(--kanban-border);
            padding: 12px 24px;
            display: flex; align-items: center; gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .kanban-filter-bar label { font-size: 13px; color: var(--kanban-text-secondary); font-weight: 500; white-space: nowrap; }
        .kanban-filter-select, .kanban-filter-input {
            height: 34px; border: 1px solid var(--kanban-border); border-radius: var(--kanban-radius-sm);
            padding: 0 10px; font-size: 13px; color: var(--kanban-text-primary);
            background: var(--kanban-surface); outline: none;
            transition: border-color var(--kanban-transition);
        }
        .kanban-filter-select:focus, .kanban-filter-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .kanban-filter-select { min-width: 100px; cursor: pointer; }
        .kanban-filter-input { width: 200px; }
        .kanban-filter-input::placeholder { color: var(--kanban-text-muted); }
        .kanban-filter-clear {
            height: 34px; padding: 0 14px; border: 1px solid var(--kanban-border); border-radius: var(--kanban-radius-sm);
            background: var(--kanban-surface); color: var(--kanban-text-secondary); font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
            transition: all var(--kanban-transition);
        }
        .kanban-filter-clear:hover { background: #f3f4f6; color: var(--kanban-text-primary); }
        .kanban-filter-divider { width: 1px; height: 20px; background: var(--kanban-border); }

        /* Board */
        .kanban-board {
            flex: 1; overflow-x: auto; overflow-y: hidden;
            padding: 20px 24px;
            display: flex; gap: 16px;
            scroll-behavior: smooth;
        }
        .kanban-board::-webkit-scrollbar { height: 6px; }
        .kanban-board::-webkit-scrollbar-track { background: transparent; }
        .kanban-board::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

        /* Column */
        .kanban-column {
            min-width: 280px; max-width: 320px; width: 280px;
            flex-shrink: 0;
            display: flex; flex-direction: column;
            background: #f8f9fb;
            border-radius: var(--kanban-radius-lg);
            border: 1px solid var(--kanban-border);
            overflow: hidden;
            transition: background var(--kanban-transition), border-color var(--kanban-transition);
        }
        .kanban-column.drag-over {
            background: #eef2ff;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
        }
        .kanban-column-header {
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--kanban-border);
            flex-shrink: 0;
        }
        .kanban-column-header-left { display: flex; align-items: center; gap: 8px; }
        .kanban-column-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .kanban-dot-backlog { background: #3b82f6; }
        .kanban-dot-todo { background: #f97316; }
        .kanban-dot-progress { background: #3b82f6; }
        .kanban-dot-review { background: #8b5cf6; }
        .kanban-dot-done { background: #10b981; }
        .kanban-column-name { font-size: 14px; font-weight: 600; color: var(--kanban-text-primary); }
        .kanban-column-count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 22px; height: 22px; padding: 0 6px;
            background: #e2e5ea; border-radius: 11px;
            font-size: 12px; font-weight: 600; color: var(--kanban-text-secondary);
            transition: all var(--kanban-transition);
        }

        /* Card List */
        .kanban-card-list {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 10px;
            display: flex; flex-direction: column; gap: 10px;
            min-height: 60px;
        }
        .kanban-card-list::-webkit-scrollbar { width: 4px; }
        .kanban-card-list::-webkit-scrollbar-track { background: transparent; }
        .kanban-card-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        /* Card */
        .kanban-card {
            background: var(--kanban-surface);
            border: 1px solid var(--kanban-border);
            border-radius: var(--kanban-radius-md);
            padding: 14px;
            cursor: grab;
            user-select: none;
            transition: transform var(--kanban-transition), box-shadow var(--kanban-transition), opacity var(--kanban-transition), border-color var(--kanban-transition);
            position: relative;
        }
        .kanban-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--kanban-shadow-md);
            border-color: #c7cdd5;
        }
        .kanban-card:active { cursor: grabbing; }
        .kanban-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            box-shadow: none;
        }
        .kanban-card.drag-clone {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            transform: rotate(2deg) scale(1.02);
            box-shadow: var(--kanban-shadow-lg);
            opacity: 0.9;
        }
        .kanban-card.hidden { display: none; }

        .kanban-card-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 8px; gap: 6px;
        }
        .kanban-card-title {
            font-size: 14px; font-weight: 600; line-height: 1.4;
            color: var(--kanban-text-primary);
            word-break: break-word;
        }
        .kanban-card-desc {
            font-size: 12px; color: var(--kanban-text-secondary); line-height: 1.5;
            margin-bottom: 10px;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Priority Badge */
        .kanban-priority {
            display: inline-flex; align-items: center; justify-content: center;
            height: 20px; padding: 0 8px; border-radius: 4px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .kanban-p0 { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
        .kanban-p1 { background: #fff7ed; color: #f97316; border: 1px solid #fed7aa; }
        .kanban-p2 { background: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
        .kanban-p3 { background: #f9fafb; color: #9ca3af; border: 1px solid #e5e7eb; }

        /* Card Footer */
        .kanban-card-footer {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px;
        }
        .kanban-card-footer-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .kanban-card-footer-right { display: flex; align-items: center; flex-shrink: 0; }

        /* Category Tag */
        .kanban-cat-tag {
            display: inline-flex; align-items: center;
            height: 20px; padding: 0 7px; border-radius: 4px;
            font-size: 11px; font-weight: 500;
        }
        .kanban-cat-frontend { background: #eff6ff; color: #3b82f6; }
        .kanban-cat-backend { background: #ecfdf5; color: #10b981; }
        .kanban-cat-design { background: #fffbeb; color: #d97706; }
        .kanban-cat-bug { background: #fef2f2; color: #ef4444; }
        .kanban-cat-requirement { background: #f5f3ff; color: #8b5cf6; }

        /* Date */
        .kanban-date {
            font-size: 11px; color: var(--kanban-text-muted);
            display: flex; align-items: center; gap: 4px;
        }
        .kanban-date.overdue { color: #ef4444; font-weight: 600; }

        /* Empty State */
        .kanban-empty {
            text-align: center; color: var(--kanban-text-muted);
            font-size: 12px; padding: 30px 0;
        }
        .kanban-empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

        /* Loading */
        .kanban-loading {
            display: flex; align-items: center; justify-content: center;
            padding: 60px; color: var(--kanban-text-muted);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kanban-header { padding: 12px 16px; }
            .kanban-filter-bar { padding: 10px 16px; gap: 8px; }
            .kanban-board { padding: 12px 16px; gap: 10px; }
            .kanban-column { min-width: 260px; max-width: 300px; width: 260px; }
            .kanban-filter-input { width: 140px; }
        }
    </style>
    </th:block>
</head>
<body>
    <div th:fragment="content" class="kanban-wrapper">
        <!-- Kanban Header -->
        <div class="kanban-header">
            <div class="kanban-header-left">
                <div class="kanban-header-logo">✓</div>
                <div>
                    <div class="kanban-header-title">待办看板</div>
                    <div class="kanban-header-subtitle">ExpHub Todo Board</div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="kanban-filter-bar">
            <label>🔍 搜索</label>
            <input class="kanban-filter-input" id="searchInput" type="text" placeholder="按标题搜索任务…" oninput="applyFilters()">
            <span class="kanban-filter-divider"></span>
            <label>优先级</label>
            <select class="kanban-filter-select" id="priorityFilter" onchange="applyFilters()">
                <option value="">全部</option>
                <option value="P0">P0</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
                <option value="P3">P3</option>
            </select>
            <button class="kanban-filter-clear" onclick="clearFilters()">✕ 清除筛选</button>
        </div>

        <!-- Board -->
        <div class="kanban-board" id="board">
            <!-- 待办池 -->
            <div class="kanban-column" data-column="backlog" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                <div class="kanban-column-header">
                    <div class="kanban-column-header-left">
                        <span class="kanban-column-dot kanban-dot-backlog"></span>
                        <span class="kanban-column-name">待办池</span>
                    </div>
                    <span class="kanban-column-count" id="count-backlog">0</span>
                </div>
                <div class="kanban-card-list" id="list-backlog"></div>
            </div>

            <!-- 待处理 -->
            <div class="kanban-column" data-column="todo" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                <div class="kanban-column-header">
                    <div class="kanban-column-header-left">
                        <span class="kanban-column-dot kanban-dot-todo"></span>
                        <span class="kanban-column-name">待处理</span>
                    </div>
                    <span class="kanban-column-count" id="count-todo">0</span>
                </div>
                <div class="kanban-card-list" id="list-todo"></div>
            </div>

            <!-- 已完成 -->
            <div class="kanban-column" data-column="done" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                <div class="kanban-column-header">
                    <div class="kanban-column-header-left">
                        <span class="kanban-column-dot kanban-dot-done"></span>
                        <span class="kanban-column-name">已完成</span>
                    </div>
                    <span class="kanban-column-count" id="count-done">0</span>
                </div>
                <div class="kanban-card-list" id="list-done"></div>
            </div>
        </div>
    </div>

    <script>
    // ===== 看板 JavaScript =====
    let tasks = [];

    // Priority ordering
    const priorityOrder = { P0: 0, P1: 1, P2: 2, P3: 3 };

    // Column mapping
    const columnMap = {
        backlog: 'list-backlog',
        todo: 'list-todo',
        done: 'list-done',
    };

    // Category → CSS class mapping
    function getCatClass(cat) {
        if (!cat) return 'backend';
        const map = { '前端': 'frontend', '后端': 'backend', '设计': 'design', '缺陷': 'bug', '需求': 'requirement' };
        return map[cat] || 'backend';
    }

    // Create card element
    function createCard(task) {
        const card = document.createElement('div');
        card.className = 'kanban-card';
        card.draggable = true;
        card.dataset.id = task.id;
        card.dataset.column = task.column;
        card.dataset.priority = task.priority;
        card.dataset.searchText = (task.title + ' ' + (task.desc || '') + ' ' + (task.assignee || '')).toLowerCase();

        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);

        card.innerHTML = `
            <div class="kanban-card-header">
                <span class="kanban-card-title">${escapeHtml(task.title)}</span>
                <span class="kanban-priority kanban-${task.priority.toLowerCase()}">${task.priority}</span>
            </div>
            <div class="kanban-card-desc">${escapeHtml(task.desc || '暂无描述')}</div>
            <div class="kanban-card-footer">
                <div class="kanban-card-footer-left">
                    <span class="kanban-cat-tag kanban-cat-${getCatClass(task.category)}">${escapeHtml(task.category || '通用')}</span>
                </div>
                <div class="kanban-card-footer-right">
                    <span class="kanban-date">📅 ${task.createdAt || '-'}</span>
                </div>
            </div>
        `;
        return card;
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Render all cards
    function renderAll() {
        // Clear all lists
        Object.values(columnMap).forEach(listId => {
            document.getElementById(listId).innerHTML = '';
        });

        if (tasks.length === 0) {
            Object.values(columnMap).forEach(listId => {
                document.getElementById(listId).innerHTML = '<div class="kanban-empty"><div class="kanban-empty-icon">📋</div>暂无待办事项</div>';
            });
            return;
        }

        // Sort tasks by priority within each column
        const sorted = [...tasks].sort((a, b) => {
            if (a.column !== b.column) return 0;
            return (priorityOrder[a.priority] || 99) - (priorityOrder[b.priority] || 99);
        });

        sorted.forEach(task => {
            const list = document.getElementById(columnMap[task.column]);
            if (list) {
                list.appendChild(createCard(task));
            }
        });

        applyFilters();
        updateCounts();
    }

    // ===== Drag & Drop =====
    let draggedCard = null;
    let dragClone = null;
    let sourceColumn = null;

    function handleDragStart(e) {
        draggedCard = this;
        sourceColumn = this.dataset.column;

        dragClone = this.cloneNode(true);
        dragClone.className = 'kanban-card drag-clone';
        dragClone.style.width = this.offsetWidth + 'px';
        dragClone.style.height = this.offsetHeight + 'px';
        dragClone.style.left = '-9999px';
        dragClone.style.top = '-9999px';
        document.body.appendChild(dragClone);

        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.id);

        requestAnimationFrame(() => { this.style.opacity = '0.4'; });
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        this.style.opacity = '';
        if (dragClone) { dragClone.remove(); dragClone = null; }
        document.querySelectorAll('.kanban-column.drag-over').forEach(col => col.classList.remove('drag-over'));
        draggedCard = null;
        sourceColumn = null;
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const column = e.currentTarget;
        column.classList.add('drag-over');
        if (dragClone) {
            dragClone.style.left = e.clientX - dragClone.offsetWidth / 2 + 'px';
            dragClone.style.top = e.clientY - dragClone.offsetHeight / 2 + 'px';
        }
    }

    function handleDragLeave(e) {
        e.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(e) {
        e.preventDefault();
        const column = e.currentTarget;
        column.classList.remove('drag-over');
        if (!draggedCard) return;

        const targetColumn = column.dataset.column;
        const taskId = parseInt(draggedCard.dataset.id);
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;

        task.column = targetColumn;

        // Persist status change to server
        const newStatus = targetColumn === 'done' ? 'COMPLETED' : 'ACTIVE';
        $.ajax({
            url: contextPath + '/api/todos/' + taskId + '/status',
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ status: newStatus })
        });

        renderAll();
        updateCounts();
    }

    // ===== Filters =====
    function applyFilters() {
        const searchText = (document.getElementById('searchInput').value || '').toLowerCase();
        const priorityFilter = document.getElementById('priorityFilter').value;

        document.querySelectorAll('.kanban-card').forEach(card => {
            if (!card.dataset.id) return;
            const task = tasks.find(t => t.id === parseInt(card.dataset.id));
            if (!task) return;

            let visible = true;
            if (searchText && !card.dataset.searchText.includes(searchText)) visible = false;
            if (priorityFilter && task.priority !== priorityFilter) visible = false;

            card.classList.toggle('hidden', !visible);
        });

        updateCounts();
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('priorityFilter').value = '';
        applyFilters();
    }

    // ===== Counts =====
    function updateCounts() {
        const hasAnyFilter = document.getElementById('searchInput').value ||
            document.getElementById('priorityFilter').value;

        Object.keys(columnMap).forEach(col => {
            if (hasAnyFilter) {
                const list = document.getElementById(columnMap[col]);
                const visibleCards = list.querySelectorAll('.kanban-card:not(.hidden)');
                document.getElementById('count-' + col).textContent = visibleCards.length;
            } else {
                const count = tasks.filter(t => t.column === col).length;
                document.getElementById('count-' + col).textContent = count;
            }
        });
    }

    // ===== Keyboard shortcut =====
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
        if (e.key === 'Escape') {
            clearFilters();
        }
    });

    // ===== Init =====
    $(function() {
        $.get(contextPath + '/api/todos/kanban', function(res) {
            if (res && res.tasks) {
                tasks = res.tasks;
            }
            renderAll();
            updateCounts();
        }).fail(function() {
            document.getElementById('board').innerHTML = '<div class="kanban-loading">⚠️ 加载看板数据失败，请稍后重试</div>';
        });
    });
    </script>
</body>
</html>
