<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调用日志 - 经验阁 ExpHub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a2e'/><text x='16' y='23' font-size='20' text-anchor='middle' fill='%23e94560' font-family='system-ui,sans-serif' font-weight='bold'>E</text></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; z-index: 100; }
        .sidebar .brand { font-size: 1.4rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar .brand span { color: #e94560; }
        .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(233,69,96,0.2); color: #fff; border-left: 3px solid #e94560; }
        .main-content { margin-left: 220px; padding: 25px; }
        .topbar { background: #fff; padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 18px 25px; }
        .table thead th { border: none; background: #f8f9fa; color: #666; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-fail { background: #f8d7da; color: #721c24; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #d63850; border-color: #d63850; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a th:href="@{/dashboard}"><i class="fas fa-chart-line mr-2"></i> 仪表盘</a>
        <a th:href="@{/docs}"><i class="fas fa-book-open mr-2"></i> 经验管理</a>
        <a th:href="@{/assistants}"><i class="fas fa-key mr-2"></i> 秘钥管理</a>
        <a th:href="@{/logs}" class="active"><i class="fas fa-history mr-2"></i> 调用日志</a>
        <a th:href="@{/templates}"><i class="fas fa-file-alt mr-2"></i> 模板管理</a>
        <div style="margin-top: 20px; padding: 0 20px;">
            <a th:href="@{/profile/password}"><i class="fas fa-lock mr-2"></i> 修改密码</a>
        </div>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a th:href="@{/logout}" class="text-white-50" style="font-size: 0.85rem;"><i class="fas fa-sign-out-alt mr-1"></i> 退出登录</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h4 class="mb-0">调用日志</h4>
            <div>
                <button class="btn btn-danger btn-sm" id="batchDeleteBtn" style="display:none;" onclick="batchDelete()">
                    <i class="fas fa-trash-alt mr-1"></i>删除选中 (<span id="selectedCount">0</span>)
                </button>
                <button class="btn btn-outline-danger btn-sm ml-2" onclick="showCleanDialog()">
                    <i class="fas fa-broom mr-1"></i>按时间清理
                </button>
            </div>
        </div>

        <!-- 筛选区域 -->
        <div class="card mb-3">
            <div class="card-body py-2">
                <div class="form-row align-items-end">
                    <div class="col-auto">
                        <label class="small text-muted mb-1">开始时间</label>
                        <input type="datetime-local" class="form-control form-control-sm" id="filterStartTime" style="width:190px;">
                    </div>
                    <div class="col-auto">
                        <label class="small text-muted mb-1">结束时间</label>
                        <input type="datetime-local" class="form-control form-control-sm" id="filterEndTime" style="width:190px;">
                    </div>
                    <div class="col-auto">
                        <label class="small text-muted mb-1">操作类型</label>
                        <select class="form-control form-control-sm" id="filterAction" style="width:110px;">
                            <option value="">全部</option>
                            <option value="SEARCH">查询</option>
                            <option value="CREATE">创建</option>
                            <option value="UPDATE">更新</option>
                            <option value="DELETE">删除</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <label class="small text-muted mb-1">调用者</label>
                        <input type="text" class="form-control form-control-sm" id="filterCallerName" placeholder="调用者名称" style="width:130px;">
                    </div>
                    <div class="col-auto">
                        <label class="small text-muted mb-1">AppKey</label>
                        <input type="text" class="form-control form-control-sm" id="filterApiKey" placeholder="Key 模糊搜索" style="width:150px;">
                    </div>
                    <div class="col-auto">
                        <label class="small text-muted mb-1">关键字</label>
                        <input type="text" class="form-control form-control-sm" id="filterKeyword" placeholder="检索关键字" style="width:130px;">
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-primary btn-sm" onclick="searchLogs()"><i class="fas fa-search mr-1"></i>搜索</button>
                        <button class="btn btn-outline-secondary btn-sm ml-1" onclick="resetFilters()"><i class="fas fa-redo mr-1"></i>重置</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th style="width:40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                            <th>操作</th>
                            <th>调用者</th>
                            <th>AppKey</th>
                            <th>检索关键字</th>
                            <th>涉及经验</th>
                            <th>命中条数</th>
                            <th>调用时间</th>
                            <th style="width:60px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="logTable">
                        <tr>
                            <td colspan="9" class="text-center text-muted py-4">
                                <i class="fas fa-spinner fa-spin mr-2"></i>加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white" id="logPagination" style="display: none;">
                <nav>
                    <ul class="pagination justify-content-center mb-0" id="logPageNav"></ul>
                </nav>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var contextPath = /*[[${contextPath}]]*/ '';
        var currentPage = 1;
        var totalPages = 0;
        var pageSize = 50;
        var selectedIds = new Set();

        // ===== 勾选逻辑 =====
        function toggleSelectAll() {
            var checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.log-checkbox').forEach(function(cb) {
                cb.checked = checked;
                if (checked) selectedIds.add(parseInt(cb.dataset.id));
                else selectedIds.delete(parseInt(cb.dataset.id));
            });
            updateBatchBtn();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBatchBtn();
        }

        function updateBatchBtn() {
            var btn = document.getElementById('batchDeleteBtn');
            document.getElementById('selectedCount').textContent = selectedIds.size;
            btn.style.display = selectedIds.size > 0 ? 'inline-block' : 'none';
            // 同步全选框状态
            var allCbs = document.querySelectorAll('.log-checkbox');
            var allChecked = allCbs.length > 0 && selectedIds.size === allCbs.length;
            document.getElementById('selectAll').checked = allChecked;
        }

        // ===== 删除功能 =====
        function deleteLog(id) {
            if (!confirm('确定要删除这条日志吗？')) return;
            fetch(contextPath + '/api/logs/' + id, { method: 'DELETE' })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.code === 0) {
                        loadLogs(currentPage);
                    } else {
                        alert('删除失败: ' + (result.msg || '未知错误'));
                    }
                })
                .catch(function(e) { alert('请求失败: ' + e.message); });
        }

        function batchDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm('确定要删除选中的 ' + selectedIds.size + ' 条日志吗？此操作不可恢复。')) return;
            var ids = Array.from(selectedIds);
            fetch(contextPath + '/api/logs/batch', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ids)
            })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.code === 0) {
                        selectedIds.clear();
                        loadLogs(currentPage);
                    } else {
                        alert('删除失败: ' + (result.msg || '未知错误'));
                    }
                })
                .catch(function(e) { alert('请求失败: ' + e.message); });
        }

        function showCleanDialog() {
            var html = '<div class="form-group">' +
                '<label>删除此时间之前的所有日志：</label>' +
                '<input type="datetime-local" class="form-control" id="cleanBeforeTime">' +
                '<small class="form-text text-muted">只保留该时间之后的日志，之前的全部清除</small>' +
                '</div>';
            document.getElementById('cleanModalBody').innerHTML = html;
            $('#cleanModal').modal('show');
        }

        function doClean() {
            var beforeTime = document.getElementById('cleanBeforeTime').value;
            if (!beforeTime) { alert('请选择时间'); return; }
            if (!confirm('确定要删除 ' + beforeTime + ' 之前的所有日志吗？此操作不可恢复！')) return;
            fetch(contextPath + '/api/logs/clean?beforeTime=' + encodeURIComponent(beforeTime), { method: 'DELETE' })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.code === 0) {
                        $('#cleanModal').modal('hide');
                        alert('已清理 ' + result.data + ' 条日志');
                        loadLogs(1);
                    } else {
                        alert('清理失败: ' + (result.msg || '未知错误'));
                    }
                })
                .catch(function(e) { alert('请求失败: ' + e.message); });
        }

        function getFilterParams() {
            var params = 'page=' + currentPage + '&size=' + pageSize;
            var action = document.getElementById('filterAction').value;
            var callerName = document.getElementById('filterCallerName').value.trim();
            var apiKey = document.getElementById('filterApiKey').value.trim();
            var keyword = document.getElementById('filterKeyword').value.trim();
            var startTime = document.getElementById('filterStartTime').value;
            var endTime = document.getElementById('filterEndTime').value;
            if (action) params += '&action=' + encodeURIComponent(action);
            if (callerName) params += '&callerName=' + encodeURIComponent(callerName);
            if (apiKey) params += '&apiKey=' + encodeURIComponent(apiKey);
            if (keyword) params += '&keyword=' + encodeURIComponent(keyword);
            if (startTime) params += '&startTime=' + encodeURIComponent(startTime);
            if (endTime) params += '&endTime=' + encodeURIComponent(endTime);
            return params;
        }

        function searchLogs() {
            currentPage = 1;
            loadLogs(1);
        }

        function resetFilters() {
            document.getElementById('filterAction').value = '';
            document.getElementById('filterCallerName').value = '';
            document.getElementById('filterApiKey').value = '';
            document.getElementById('filterKeyword').value = '';
            document.getElementById('filterStartTime').value = '';
            document.getElementById('filterEndTime').value = '';
            currentPage = 1;
            loadLogs(1);
        }

        function renderPagination() {
            var nav = document.getElementById('logPageNav');
            if (totalPages <= 1) {
                document.getElementById('logPagination').style.display = 'none';
                return;
            }
            document.getElementById('logPagination').style.display = 'block';
            var html = '';
            html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '">' +
                '<a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + (currentPage - 1) + ')">&laquo; 上一页</a></li>';
            var start = Math.max(1, currentPage - 2);
            var end = Math.min(totalPages, currentPage + 2);
            if (start > 1) {
                html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="loadLogs(1)">1</a></li>';
                if (start > 2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
            for (var i = start; i <= end; i++) {
                html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '">' +
                    '<a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + i + ')">' + i + '</a></li>';
            }
            if (end < totalPages) {
                if (end < totalPages - 1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + totalPages + ')">' + totalPages + '</a></li>';
            }
            html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '">' +
                '<a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + (currentPage + 1) + ')">下一页 &raquo;</a></li>';
            nav.innerHTML = html;
        }

        async function loadLogs(page) {
            page = page || 1;
            currentPage = page;
            selectedIds.clear();
            updateBatchBtn();
            try {
                var resp = await fetch(contextPath + '/api/logs?' + getFilterParams());
                var result = await resp.json();
                if (result.code === 0 && result.data.list && result.data.list.length > 0) {
                    totalPages = result.data.totalPages || Math.ceil(result.data.total / pageSize);
                    var html = '';
                    result.data.list.forEach(function(log) {
                        var actionMap = {SEARCH:'查询', CREATE:'创建', UPDATE:'更新', DELETE:'删除'};
                        var actionLabel = actionMap[log.action] || log.action || '-';
                        var actionBadge = '';
                        if (log.action === 'SEARCH') actionBadge = 'badge-info';
                        else if (log.action === 'CREATE') actionBadge = 'badge-success';
                        else if (log.action === 'UPDATE') actionBadge = 'badge-warning';
                        else if (log.action === 'DELETE') actionBadge = 'badge-danger';
                        var relatedTitle = log.docTitle || log.detail || '-';
                        html += '<tr>' +
                            '<td><input type="checkbox" class="log-checkbox" data-id="' + log.id + '" onchange="toggleSelect(' + log.id + ')"></td>' +
                            '<td><span class="badge ' + actionBadge + '">' + actionLabel + '</span></td>' +
                            '<td><i class="fas fa-user mr-1 text-muted"></i>' + (log.callerName || '-') + '</td>' +
                            '<td><code class="small">' + (log.apiKey || '-') + '</code></td>' +
                            '<td><span class="badge badge-info">' + (log.keyword || '-') + '</span></td>' +
                            '<td class="small" title="' + (log.detail || '') + '">' + relatedTitle + '</td>' +
                            '<td><span class="text-success font-weight-bold">' + (log.hitCount || 0) + '</span> 条</td>' +
                            '<td class="text-muted small">' + new Date(log.createdAt).toLocaleString('zh-CN') + '</td>' +
                            '<td><button class="btn btn-outline-danger btn-sm py-0 px-1" onclick="deleteLog(' + log.id + ')" title="删除"><i class="fas fa-trash-alt fa-sm"></i></button></td>' +
                        '</tr>';
                    });
                    document.getElementById('logTable').innerHTML = html;
                    renderPagination();
                } else {
                    document.getElementById('logTable').innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">暂无数据</td></tr>';
                    document.getElementById('logPagination').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('logTable').innerHTML = '<tr><td colspan="9" class="text-center text-danger py-4">加载失败: ' + e.message + '</td></tr>';
            }
        }
        loadLogs();
    </script>

    <!-- 时间清理弹窗 -->
    <div class="modal fade" id="cleanModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-broom mr-2"></i>按时间清理日志</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body" id="cleanModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="doClean()"><i class="fas fa-trash-alt mr-1"></i>确认清理</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
