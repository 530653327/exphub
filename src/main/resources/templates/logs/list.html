<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调用日志 - 经验阁 ExpHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 0; z-index: 100; }
        .sidebar .brand { font-size: 1.4rem; font-weight: bold; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar .brand span { color: #e94560; }
        .sidebar a { display: block; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(233,69,96,0.2); color: #fff; border-left: 3px solid #e94560; }
        .main-content { margin-left: 220px; padding: 25px; }
        .topbar { background: #fff; padding: 15px 25px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 18px 25px; }
        .table thead th { border: none; background: #f8f9fa; color: #666; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-fail { background: #f8d7da; color: #721c24; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #d63850; border-color: #d63850; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">经验<span>阁</span> ExpHub</div>
        <a th:href="@{/dashboard}"><i class="fas fa-chart-line mr-2"></i> 仪表盘</a>
        <a th:href="@{/docs}"><i class="fas fa-book-open mr-2"></i> 经验管理</a>
        <a th:href="@{/assistants}"><i class="fas fa-key mr-2"></i> 秘钥管理</a>
        <a th:href="@{/logs}" class="active"><i class="fas fa-history mr-2"></i> 调用日志</a>
        <a th:href="@{/templates}"><i class="fas fa-file-alt mr-2"></i> 模板管理</a>
        <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 20px;">
            <a th:href="@{/logout}" class="text-white-50" style="font-size: 0.85rem;"><i class="fas fa-sign-out-alt mr-1"></i> 退出登录</a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h4 class="mb-0">调用日志</h4>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>调用者</th>
                            <th>AppKey</th>
                            <th>检索关键字</th>
                            <th>命中条数</th>
                            <th>调用时间</th>
                        </tr>
                    </thead>
                    <tbody id="logTable">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="fas fa-spinner fa-spin mr-2"></i>加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white" id="logPagination" style="display: none;">
                <nav>
                    <ul class="pagination justify-content-center mb-0" id="logPageNav"></ul>
                </nav>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var contextPath = /*[[${contextPath}]]*/ '';
        var currentPage = 1;
        var totalPages = 0;
        var pageSize = 50;

        function renderPagination() {
            var nav = document.getElementById('logPageNav');
            if (totalPages <= 1) {
                document.getElementById('logPagination').style.display = 'none';
                return;
            }
            document.getElementById('logPagination').style.display = 'block';
            var html = '';
            html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '">' +
                '<a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + (currentPage - 1) + ')">&laquo; 上一页</a></li>';
            var start = Math.max(1, currentPage - 2);
            var end = Math.min(totalPages, currentPage + 2);
            if (start > 1) {
                html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="loadLogs(1)">1</a></li>';
                if (start > 2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
            for (var i = start; i <= end; i++) {
                html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '">' +
                    '<a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + i + ')">' + i + '</a></li>';
            }
            if (end < totalPages) {
                if (end < totalPages - 1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
                html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + totalPages + ')">' + totalPages + '</a></li>';
            }
            html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '">' +
                '<a class="page-link" href="javascript:void(0)" onclick="loadLogs(' + (currentPage + 1) + ')">下一页 &raquo;</a></li>';
            nav.innerHTML = html;
        }

        async function loadLogs(page) {
            page = page || 1;
            currentPage = page;
            try {
                var resp = await fetch(contextPath + '/api/logs?page=' + page + '&size=' + pageSize);
                var result = await resp.json();
                if (result.code === 0 && result.data.list && result.data.list.length > 0) {
                    totalPages = result.data.totalPages || Math.ceil(result.data.total / pageSize);
                    var html = '';
                    result.data.list.forEach(function(log) {
                        html += '<tr>' +
                            '<td><i class="fas fa-user mr-1 text-muted"></i>' + (log.callerName || '-') + '</td>' +
                            '<td><code class="small">' + (log.apiKey || '-') + '</code></td>' +
                            '<td><span class="badge badge-info">' + (log.keyword || '-') + '</span></td>' +
                            '<td><span class="text-success font-weight-bold">' + (log.hitCount || 0) + '</span> 条</td>' +
                            '<td class="text-muted small">' + new Date(log.createdAt).toLocaleString('zh-CN') + '</td>' +
                        '</tr>';
                    });
                    document.getElementById('logTable').innerHTML = html;
                    renderPagination();
                } else {
                    document.getElementById('logTable').innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">暂无数据</td></tr>';
                    document.getElementById('logPagination').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('logTable').innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">加载失败: ' + e.message + '</td></tr>';
            }
        }
        loadLogs();
    </script>
</body>
</html>
