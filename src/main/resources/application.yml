server:
  port: 3099
  servlet:
    context-path: /

spring:
  application:
    name: ExpHub

  datasource:
    url: jdbc:mysql://cloudim.club:3306/exphub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: ***CHANGED***
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5


    host: cloudim.club
    port: 6379
    database: 0
    timeout: 5000ms


  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    servlet:
      content-type: text/html

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.exphub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.exphub: DEBUG
    com.baomidou.mybatisplus: DEBUG

# ExpHub 自定义配置
exphub:
  # 管理员默认密码（首次启动后请修改）
  admin:
    default-password: changeme
  # API Key 配置
  api-key:
    length: 32