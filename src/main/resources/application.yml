server:
  port: 3099
  servlet:
    context-path: /exphub
  forward-headers-strategy: native
  tomcat:
    max-http-form-post-size: 2MB
    connection-timeout: 120000

spring:
  application:
    name: ExpHub

  datasource:
    url: ${EXPHUB_DB_URL:jdbc:mysql://localhost:3306/exphub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${EXPHUB_DB_USERNAME:root}
    password: ${EXPHUB_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5




    database: 0
    timeout: 5000ms


  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    servlet:
      content-type: text/html

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  ai:
    mcp:
      server:
        name: exphub
        version: 1.0.0
        type: SYNC
        stdio: false
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /exphub/mcp/message

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.security: DEBUG
    com.exphub: DEBUG
